<app-notification />

<nav>
  <div class="nav-links">
    <a routerLink="/gradovi" routerLinkActive="active">Gradovi</a>
    <a routerLink="/lokacije" routerLinkActive="active">Lokacije</a>
    <a routerLink="/koncerti" routerLinkActive="active">Koncerti</a>
    <a routerLink="/zanrovi" routerLinkActive="active">Žanrovi</a>
    <a routerLink="/izvodjaci" routerLinkActive="active">Izvođači</a>
    <a routerLink="/karte" routerLinkActive="active">Karte</a>
  </div>
  <div class="nav-user">
    @if (authService.ulogovan()) {

      <a routerLink="/login" class="btn-login">Prijavi se</a>
    }

<main>
